    <style>
        #skills-cloud-container {
            width: 100%;
            max-width: 1200px;
            height: 700px;
            margin: 30px auto;
            position: relative;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            perspective: 1000px;
        }
        
        #skills-cloud {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            cursor: grab;
        }
        
        #skills-cloud:active {
            cursor: grabbing;
        }
        
        .skill-word {
            position: absolute;
            left: 50%;
            top: 50%;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            user-select: none;
            transition: transform 0.1s ease-out, opacity 0.3s ease;
            transform-style: preserve-3d;
            white-space: nowrap;
        }
        
        #skills-instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            font-size: 0.95rem;
            font-weight: 600;
            color: #2c3e50;
            z-index: 10;
            animation: fadeInDown 1s ease-out;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            #skills-cloud-container {
                height: 500px;
            }
            
            #skills-instructions {
                font-size: 0.8rem;
                padding: 10px 20px;
            }
        }
    </style>
</head>

    <script>
        // Skills data extracted from the original skills page
        const skillsData = [
            // Programming Languages
            { name: 'C', proficiency: 80, category: 'wayne-state' },

            // Data Analysis, ML & APIs
            { name: 'Pandas', proficiency: 85, category: 'multi' },

            { name: 'Matplotlib', proficiency: 80, category: 'wayne-state' },

            { name: 'OpenCV', proficiency: 80, category: 'live-stats' },
            { name: 'RoboFlow', proficiency: 65, category: 'live-stats' },
            { name: 'SportsRadar API', proficiency: 80, category: 'live-stats' },
            { name: 'SolidWorks PDM API', proficiency: 75, category: 'airborne-systems' },
            { name: 'OpenAI API', proficiency: 100, category: 'wayne-state' },
            
            // Application Development
            { name: 'Django', proficiency: 70, category: 'live-stats' },
            { name: 'Heroku', proficiency: 65, category: 'live-stats' },
            { name: 'AWS', proficiency: 60, category: 'wayne-state' },
            { name: 'PyQt5', proficiency: 80, category: 'multi' },
            { name: 'Tesseract-OCR', proficiency: 65, category: 'live-stats' },
            { name: 'SSH', proficiency: 100, category: 'live-stats' },
            { name: 'Raspberry Pi', proficiency: 85, category: 'live-stats' },
            { name: 'Twilio', proficiency: 80, category: 'wayne-state' },
            { name: 'React Native', proficiency: 50, category: 'wayne-state' },
            { name: 'ffmpeg', proficiency: 80, category: 'multi' },
            { name: 'Firebase', proficiency: 100, category: 'wayne-state' },
            
            // DevOps & Agile
            { name: 'GitHub', proficiency: 100, category: 'wayne-state' },
            { name: 'GitHub Actions', proficiency: 100, category: 'wayne-state' },
            { name: 'Git', proficiency: 100, category: 'airborne-systems' },
            { name: 'Git Hooks (Update & Post-Receive)', proficiency: 80, category: 'airborne-systems' },
            { name: 'SCRUM', proficiency: 80, category: 'wayne-state' },
            { name: 'Waterfall', proficiency: 70, category: 'airborne-systems' }
        ];

        // Category colors (matching original design)
        const categoryColors = {
            'wayne-state': '#4CAF50',      // Green
            'live-stats': '#2196F3',       // Blue
            'airborne-systems': '#9E9E9E', // Gray
            'multi': '#f44336'             // Red
        };

        // 3D Word Cloud implementation
        class WordCloud3D {
            constructor(container, skills) {
                this.container = container;
                this.skills = skills;
                this.words = [];
                this.angleX = 0;
                this.angleY = 0;
                this.targetAngleX = 0;
                this.targetAngleY = 0;
                this.isDragging = false;
                this.lastMouseX = 0;
                this.lastMouseY = 0;
                this.radius = 250;
                this.scale = 1;
                
                this.init();
                this.bindEvents();
                this.animate();
            }
            
            init() {
                // Create word elements and position them in 3D space
                this.skills.forEach((skill, index) => {
                    const word = document.createElement('div');
                    word.className = 'skill-word';
                    word.textContent = skill.name;
                    
                    // Calculate size based on proficiency (maps proficiency 0-100% to 16-48px)
                    const minSize = 16;
                    const maxSize = 48;
                    const size = minSize + (skill.proficiency / 100) * (maxSize - minSize);
                    word.style.fontSize = size + 'px';
                    word.style.color = categoryColors[skill.category];
                    
                    // Position in sphere using Fibonacci sphere algorithm
                    const phi = Math.acos(-1 + (2 * index) / this.skills.length);
                    const theta = Math.sqrt(this.skills.length * Math.PI) * phi;
                    
                    word.phi = phi;
                    word.theta = theta;
                    word.skill = skill;
                    
                    this.container.appendChild(word);
                    this.words.push(word);
                });
            }
            
            updatePositions() {
                const centerX = this.container.offsetWidth / 2;
                const centerY = this.container.offsetHeight / 2;
                
                this.words.forEach(word => {
                    // Calculate 3D position
                    const x = this.radius * Math.cos(word.theta + this.angleY) * Math.sin(word.phi + this.angleX);
                    const y = this.radius * Math.sin(word.theta + this.angleY) * Math.sin(word.phi + this.angleX);
                    const z = this.radius * Math.cos(word.phi + this.angleX);
                    
                    // Calculate scale and opacity based on z-position
                    const perspective = 500;
                    // Prevent division by zero or negative scale
                    const safeZ = Math.min(z, perspective - 1);
                    const scale = perspective / (perspective - safeZ) * this.scale;
                    const opacity = (z + this.radius) / (2 * this.radius);
                    
                    // Apply transform
                    word.style.transform = `translate(-50%, -50%) translate3d(${x}px, ${y}px, ${z}px) scale(${scale})`;
                    word.style.opacity = Math.max(0.3, opacity);
                    word.style.zIndex = Math.floor(z + this.radius);
                });
            }
            
            bindEvents() {
                // Mouse events
                this.container.addEventListener('mousedown', (e) => {
                    this.isDragging = true;
                    this.lastMouseX = e.clientX;
                    this.lastMouseY = e.clientY;
                    e.preventDefault();
                });
                
                document.addEventListener('mousemove', (e) => {
                    if (this.isDragging) {
                        const deltaX = e.clientX - this.lastMouseX;
                        const deltaY = e.clientY - this.lastMouseY;
                        
                        this.targetAngleY += deltaX * 0.01;
                        this.targetAngleX += deltaY * 0.01;
                        
                        this.lastMouseX = e.clientX;
                        this.lastMouseY = e.clientY;
                    }
                });
                
                document.addEventListener('mouseup', () => {
                    this.isDragging = false;
                });
                
                // Touch events
                this.container.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 1) {
                        this.isDragging = true;
                        this.lastMouseX = e.touches[0].clientX;
                        this.lastMouseY = e.touches[0].clientY;
                        e.preventDefault();
                    }
                });
                
                this.container.addEventListener('touchmove', (e) => {
                    if (this.isDragging && e.touches.length === 1) {
                        const deltaX = e.touches[0].clientX - this.lastMouseX;
                        const deltaY = e.touches[0].clientY - this.lastMouseY;
                        
                        this.targetAngleY += deltaX * 0.01;
                        this.targetAngleX += deltaY * 0.01;
                        
                        this.lastMouseX = e.touches[0].clientX;
                        this.lastMouseY = e.touches[0].clientY;
                        e.preventDefault();
                    }
                });
                
                this.container.addEventListener('touchend', () => {
                    this.isDragging = false;
                });
                
                // Wheel event for zoom
                this.container.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const delta = e.deltaY * 0.001;
                    this.scale = Math.max(0.5, Math.min(2, this.scale - delta));
                });
                
                // Window resize
                window.addEventListener('resize', () => {
                    this.updatePositions();
                });
            }
            
            animate() {
                // Smooth rotation
                this.angleY += (this.targetAngleY - this.angleY) * 0.1;
                this.angleX += (this.targetAngleX - this.angleX) * 0.1;
                
                // Auto-rotate slowly when not dragging
                if (!this.isDragging) {
                    this.targetAngleY += 0.002;
                }
                
                this.updatePositions();
                requestAnimationFrame(() => this.animate());
            }
        }

        // Initialize when page loads
        window.addEventListener('load', () => {
            const container = document.getElementById('skills-cloud');
            new WordCloud3D(container, skillsData);
        });
    </script>
